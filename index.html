<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
<title>Workout Tracker</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230E1116'/%3E%3Ctext x='50' y='62' font-size='50' text-anchor='middle' fill='%23C9A14A'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0E1116" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { background: #0E1116; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #E8EAED;
    padding-bottom: 90px;
  }
  ::selection { background: #C9A14A55; }
  button { font-family: inherit; cursor: pointer; }

  .header {
    position: sticky; top: 0; z-index: 10;
    background: #0E1116ee;
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #1F2530;
    padding: 14px 18px 12px;
  }
  .header-row { display: flex; justify-content: space-between; align-items: baseline; }
  .eyebrow { font-size: 11px; letter-spacing: 1.5px; color: #C9A14A; font-weight: 700; text-transform: uppercase; }
  .title { font-size: 22px; font-weight: 800; margin-top: 2px; color: #fff; }
  .subtitle { color: #7C8493; font-weight: 500; font-size: 16px; }
  .all-days-btn {
    background: #1A1F29; border: 1px solid #2A3140; color: #C9A14A;
    border-radius: 10px; padding: 8px 12px; font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
  }
  .progress-track { margin-top: 12px; background: #1A1F29; border-radius: 999px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#C9A14A,#E8C77A); transition: width .3s ease; }
  .progress-label { font-size: 11px; color: #7C8493; margin-top: 6px; }

  .focus-note { padding: 16px 18px 0; font-size: 13px; color: #9CA3AF; line-height: 1.5; font-style: italic; }

  .section { padding: 18px 18px 0; }
  .section-head { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; }
  .section-icon { color: #C9A14A; font-size: 14px; }
  .section-label { font-size: 13px; font-weight: 700; color: #F0F1F3; }
  .section-sub { font-size: 12px; color: #5B6270; }

  .warmup-text { font-size: 14.5px; color: #D1D5DB; line-height: 1.55; }

  .stretch-list { margin: 0; padding-left: 18px; display: flex; flex-direction: column; gap: 7px; }
  .stretch-list li { font-size: 14.5px; color: #D1D5DB; line-height: 1.4; }

  .round-block { margin-bottom: 18px; }
  .round-block:last-child { margin-bottom: 0; }
  .round-label { font-size: 12px; font-weight: 700; color: #C9A14A; letter-spacing: 0.5px; margin-bottom: 8px; }
  .ex-list { display: flex; flex-direction: column; gap: 8px; }

  .ex-item {
    display: flex; align-items: flex-start; gap: 12px;
    background: #161A22; border: 1px solid #232A36;
    border-radius: 12px; padding: 12px 14px; text-align: left;
    transition: all .15s ease; width: 100%;
  }
  .ex-item.checked { background: #16201A; border-color: #2D4A33; }

  .ex-check {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 7px; margin-top: 1px;
    border: 1.5px solid #3A4150;
    display: flex; align-items: center; justify-content: center;
  }
  .ex-item.checked .ex-check { background: #5FBF73; border-color: #5FBF73; }
  .ex-check svg { display: none; }
  .ex-item.checked .ex-check svg { display: block; }

  .ex-body { flex: 1; min-width: 0; }
  .ex-top { display: flex; justify-content: space-between; gap: 8px; }
  .ex-name { font-size: 15px; font-weight: 600; color: #F0F1F3; }
  .ex-item.checked .ex-name { color: #8FAE96; text-decoration: line-through; text-decoration-color: #5FBF7388; }
  .ex-reps { font-size: 14px; font-weight: 700; color: #C9A14A; flex-shrink: 0; }
  .ex-item.checked .ex-reps { color: #5FBF73; }
  .ex-note { font-size: 12.5px; color: #7C8493; margin-top: 3px; line-height: 1.4; }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #11151Cee; backdrop-filter: blur(10px);
    border-top: 1px solid #1F2530;
    padding: 12px 18px calc(12px + env(safe-area-inset-bottom));
    display: flex; gap: 10px;
  }
  .nav-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 13px 0; border-radius: 12px; font-size: 14px; font-weight: 700;
    background: #1A1F29; color: #E8EAED; border: 1px solid #2A3140;
  }
  .nav-btn.primary { background: linear-gradient(135deg,#C9A14A,#B8893A); color: #0E1116; border: none; }
  .nav-btn:disabled { background: #161A22; color: #3A4150; border-color: #1F2530; opacity: .5; }

  .overlay {
    position: fixed; inset: 0; background: #0009; z-index: 20;
    display: none; align-items: flex-end;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: #11151C; width: 100%; max-height: 80vh; overflow-y: auto;
    border-radius: 20px 20px 0 0; padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
    border: 1px solid #232A36; border-bottom: none;
  }
  .sheet-handle { width: 36px; height: 4px; background: #2A3140; border-radius: 99px; margin: 0 auto 16px; }
  .sheet-title { font-size: 16px; font-weight: 800; margin-bottom: 14px; color: #fff; }
  .week-block { margin-bottom: 14px; }
  .week-label { font-size: 11px; font-weight: 700; color: #7C8493; letter-spacing: 1px; margin-bottom: 8px; }
  .day-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .day-card {
    background: #161A22; border: 1px solid #232A36; border-radius: 10px;
    padding: 10px 12px; text-align: left; width: 100%;
  }
  .day-card.current { background: #2A2410; border-color: #C9A14A; }
  .day-card-label { font-size: 11px; color: #7C8493; font-weight: 700; }
  .day-card.current .day-card-label { color: #C9A14A; }
  .day-card-title { font-size: 13px; color: #E8EAED; font-weight: 600; margin-top: 2px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
/* ---------------- PROGRAM DATA ---------------- */

const warmup = "Treadmill incline walk (brisk, 8-12% incline), elliptical, stair stepper, or rower — pick one, no running.";

const stretchBlocks = [
  ["Cat-cow, 10 slow reps","World's greatest stretch, 5/side","Hip flexor lunge stretch, 30 sec/side","Standing quad stretch, 30 sec/side","Cross-body shoulder stretch (left, gentle), 30 sec","Thread the needle, 5/side","Standing forward fold, 30-45 sec","Band shoulder dislocates or arm circles, 15 reps (left light)"],
  ["90/90 hip stretch, 30 sec/side","Pigeon stretch, 30-45 sec/side","Lying spinal twist, 30 sec/side","Doorway chest/shoulder stretch (light), 30 sec","Calf stretch on wall, 30 sec/side","Child's pose with reach, 45 sec","Standing side bend, 5/side","Neck rolls + shoulder rolls, 10 each way"],
  ["Walking knee hugs, 10 steps","Walking quad pulls, 10 steps","Leg swings front-to-back, 10/side","Leg swings side-to-side, 10/side","Hip circles, 10/direction","Cat-cow into thread the needle, 8 reps","Lat stretch on rack/pole, 30 sec/side","Seated figure-4 glute stretch, 30 sec/side"],
];

const dayTypes = {
  fullBodyA: {
    title: "Full Body A",
    rounds: [
      [["Goblet squat","10","Bilateral, knee-friendly. Controlled tempo."],["Seated cable row","10","Squeeze shoulder blades — easy on left shoulder."],["Incline DB press (light-mod)","10","Stop short of full shoulder stretch at bottom."]],
      [["Romanian deadlift (DB)","10","Soft knees, hinge at hips, flat back."],["Lat pulldown","10","Controlled, avoid yanking with left shoulder."],["Walking step-ups (low box)","10/leg","Low box only — keep knee load light."]],
      [["Leg press (moderate)","10","Bilateral — main knee-safe leg driver."],["Cable face pull","12","Shoulder health, light band tension."],["Plank shoulder taps","20 total","Core + shoulder stability, no back strain."]],
    ],
    ab: ["Dead bug","10/side","Slow and controlled — protects lower back."],
  },
  upperBody: {
    title: "Upper Body",
    subtitle: "Chest / Back / Arms",
    rounds: [
      [["Chest press machine","10","Machine path protects left shoulder vs free press."],["Single-arm DB row","10/side","Controlled, full back engagement."],["Cable bicep curl","10","Standard tempo."]],
      [["Cable chest fly","10","Soft elbows, stop before deep stretch on left."],["Assisted pull-up / lat pulldown","10","No kipping, no muscle-up style movement."],["Triceps rope pushdown","10","Standard tempo."]],
      [["Pec deck or push-up","10","Push-up only if shoulder feels good."],["Seated cable row, wide grip","10","Squeeze back, not shoulder."],["Hammer curl + OH triceps ext","8 each","Keep overhead range light."]],
    ],
    ab: ["Side plank","20-30 sec/side","Builds core without spinal loading."],
  },
  fullBodyB: {
    title: "Full Body B",
    rounds: [
      [["DB deadlift (light-mod)","10","Flat back priority — rehab for low back too."],["Standing cable chest press","10","Stable, shoulder-friendly bench alternative."],["Glute bridge","12","Low-back-friendly posterior chain work."]],
      [["Hip thrust (BB/machine)","10","Bilateral, knee stays out of it entirely."],["Band/cable face pull","12","Rotator cuff health, light resistance."],["Standing DB shoulder press (light)","10","Stop at ear level — no full lockout if it pinches."]],
      [["Leg curl machine","10","Bilateral hamstring work, no knee torque."],["Seated row","10","Controlled."],["Farmer's carry","30-40 sec","Full-body, spine-neutral, easy on everything."]],
    ],
    ab: ["Bird dog","10/side","Lower back stability — do this one with intent."],
  },
  lowerBody: {
    title: "Lower Body",
    subtitle: "Knee-Friendly",
    rounds: [
      [["Leg press (mod-controlled)","10","Primary quad driver — bilateral, no isolation."],["Hip thrust","10","Glutes/hamstrings without knee stress."],["Standing calf raise","12","Light, controlled."]],
      [["Goblet squat (light-mod)","10","Box squat depth if knee feels tight."],["Seated leg curl","10","Bilateral hamstring isolation, knee-safe."],["Cable hip abduction","10/side","Light — knee health support work."]],
      [["Romanian deadlift","10","Hamstring/glute focus, spares the knee."],["Leg extension (light only)","10","Keep weight light given the knee."],["Glute bridge march","10/side","Controlled, no impact."]],
    ],
    ab: ["Pallof press","10/side","Anti-rotation core work, very back-friendly."],
  },
};

const dayOrder = ["fullBodyA", "upperBody", "fullBodyB", "lowerBody"];

const weekFocus = [
  "Re-establish movement quality and mobility. Moderate weight, full attention on form and the stretch blocks.",
  "Same structure, same stretch emphasis. Small upticks in weight where reps 8-10 felt easy last week.",
  "Mobility should be improving — stretch blocks can move faster, more effort into the strength rounds.",
  "Best week of the block. Push weight slightly on lifts that have felt solid, keep every rep clean.",
];

const program = [];
for (let w = 0; w < 4; w++) {
  for (let d = 0; d < 4; d++) {
    const key = dayOrder[d];
    const base = dayTypes[key];
    program.push({
      id: `w${w + 1}d${d + 1}`,
      week: w + 1,
      dayNum: d + 1,
      title: base.title,
      subtitle: base.subtitle || null,
      focus: weekFocus[w],
      stretches: stretchBlocks[(w + d) % stretchBlocks.length],
      rounds: base.rounds,
      ab: base.ab,
    });
  }
}

/* ---------------- STORAGE (localStorage, standalone) ---------------- */

const PROGRESS_KEY = "workout-progress-v1";
const CHECKS_PREFIX = "workout-checks-v1:";

function getProgress() {
  const v = localStorage.getItem(PROGRESS_KEY);
  const idx = v ? parseInt(v, 10) : 0;
  return (!isNaN(idx) && idx >= 0 && idx < program.length) ? idx : 0;
}
function saveProgress(idx) {
  localStorage.setItem(PROGRESS_KEY, String(idx));
}
function getChecks(dayId) {
  const v = localStorage.getItem(CHECKS_PREFIX + dayId);
  return v ? JSON.parse(v) : {};
}
function saveChecks(dayId, checks) {
  localStorage.setItem(CHECKS_PREFIX + dayId, JSON.stringify(checks));
}

/* ---------------- STATE ---------------- */

let currentIdx = getProgress();
let checks = getChecks(program[currentIdx].id);
let navOpen = false;

/* ---------------- RENDER ---------------- */

const ICONS = {
  flame: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>',
  wind: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>',
  dumbbell: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6.5 6.5 11 11M21 21l-1-1M3 3l1 1m5.5 1.5-4 4m11 5-4 4M14 5l5 5M5 14l5 5M9.5 9.5l5 5"/></svg>',
  check: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0E1116" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>',
  chevronLeft: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>',
  chevronRight: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>',
};

function render() {
  const day = program[currentIdx];
  const totalExercises = day.rounds.reduce((a, r) => a + r.length, 0) + 1;
  const checkedCount = Object.values(checks).filter(Boolean).length;
  const progressPct = Math.round((checkedCount / totalExercises) * 100);

  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="header">
      <div class="header-row">
        <div>
          <div class="eyebrow">Week ${day.week} · Day ${day.dayNum}</div>
          <div class="title">${day.title}${day.subtitle ? ` <span class="subtitle">· ${day.subtitle}</span>` : ""}</div>
        </div>
        <button class="all-days-btn" id="allDaysBtn">ALL DAYS</button>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${progressPct}%"></div></div>
      <div class="progress-label">${checkedCount}/${totalExercises} done</div>
    </div>

    <div class="focus-note">${day.focus}</div>

    <div class="section">
      <div class="section-head"><span class="section-icon">${ICONS.flame}</span><span class="section-label">Warmup</span><span class="section-sub">· 10 min</span></div>
      <div class="warmup-text">${warmup}</div>
    </div>

    <div class="section">
      <div class="section-head"><span class="section-icon">${ICONS.wind}</span><span class="section-label">Stretch</span><span class="section-sub">· 12-15 min</span></div>
      <ul class="stretch-list">${day.stretches.map(s => `<li>${s}</li>`).join("")}</ul>
    </div>

    <div class="section">
      <div class="section-head"><span class="section-icon">${ICONS.dumbbell}</span><span class="section-label">Strength</span><span class="section-sub">· 30-35 min · 3 rounds</span></div>
      ${day.rounds.map((round, ri) => {
        const isLast = ri === day.rounds.length - 1;
        const exercises = isLast ? [...round, day.ab] : round;
        return `
          <div class="round-block">
            <div class="round-label">ROUND ${ri + 1}</div>
            <div class="ex-list">
              ${exercises.map((ex, ei) => {
                const key = `${ri}-${ei}`;
                const isChecked = !!checks[key];
                return `
                  <button class="ex-item ${isChecked ? "checked" : ""}" data-key="${key}">
                    <div class="ex-check">${ICONS.check}</div>
                    <div class="ex-body">
                      <div class="ex-top">
                        <div class="ex-name">${ex[0]}</div>
                        <div class="ex-reps">${ex[1]}</div>
                      </div>
                      <div class="ex-note">${ex[2]}</div>
                    </div>
                  </button>
                `;
              }).join("")}
            </div>
          </div>
        `;
      }).join("")}
    </div>

    <div class="bottom-nav">
      <button class="nav-btn" id="prevBtn" ${currentIdx === 0 ? "disabled" : ""}>${ICONS.chevronLeft} Prev</button>
      <button class="nav-btn primary" id="nextBtn" ${currentIdx === program.length - 1 ? "disabled" : ""}>Next Day ${ICONS.chevronRight}</button>
    </div>

    <div class="overlay ${navOpen ? "open" : ""}" id="overlay">
      <div class="sheet" id="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">4-Week Program</div>
        ${[1,2,3,4].map(wk => `
          <div class="week-block">
            <div class="week-label">WEEK ${wk}</div>
            <div class="day-grid">
              ${program.filter(p => p.week === wk).map(p => {
                const idx = program.indexOf(p);
                const isCurrent = idx === currentIdx;
                return `
                  <button class="day-card ${isCurrent ? "current" : ""}" data-idx="${idx}">
                    <div class="day-card-label">DAY ${p.dayNum}</div>
                    <div class="day-card-title">${p.title}</div>
                  </button>
                `;
              }).join("")}
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `;

  attachListeners();
}

function attachListeners() {
  document.querySelectorAll(".ex-item").forEach(btn => {
    btn.addEventListener("click", () => {
      const key = btn.dataset.key;
      checks[key] = !checks[key];
      saveChecks(program[currentIdx].id, checks);
      render();
    });
  });

  document.getElementById("prevBtn").addEventListener("click", () => goTo(currentIdx - 1));
  document.getElementById("nextBtn").addEventListener("click", () => goTo(currentIdx + 1));
  document.getElementById("allDaysBtn").addEventListener("click", () => { navOpen = true; render(); });

  const overlay = document.getElementById("overlay");
  overlay.addEventListener("click", (e) => { if (e.target.id === "overlay") { navOpen = false; render(); } });

  document.querySelectorAll(".day-card").forEach(btn => {
    btn.addEventListener("click", () => goTo(parseInt(btn.dataset.idx, 10)));
  });
}

function goTo(idx) {
  if (idx < 0 || idx >= program.length) return;
  currentIdx = idx;
  saveProgress(idx);
  checks = getChecks(program[currentIdx].id);
  navOpen = false;
  window.scrollTo({ top: 0, behavior: "auto" });
  render();
}

render();
</script>
</body>
</html>
